{% extends 'base.html' %}

{% block content %}

<h2>Register</h2>

<form method="POST">

    {% csrf_token %}

    <p>
        Username
        <input type="text" name="username">
    </p>

    <p>
        Email
        <input type="email" name="email">
    </p>

    <p>
        Password
        <input type="password" name="password1">
    </p>

    <p>
        Confirm Password
        <input type="password" name="password2">
    </p>

    <button type="submit">
        Register
    </button>

</form>

{% if error %}
<div class="message error">
    {{ error }}
</div>
{% endif %}

{% endblock %}
