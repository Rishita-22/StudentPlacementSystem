{% extends 'base.html' %}

{% block content %}

<h2>My Applications</h2>

<table>

<tr>
    <th>Company</th>
    <th>Job Title</th>
    <th>Status</th>
    <th>Applied Date</th>
</tr>

{% for application in applications %}

<tr>

    <td>
        {{ application.job.company }}
    </td>

    <td>
        {{ application.job.title }}
    </td>

    <td>
        {{ application.status }}
    </td>

    <td>
        {{ application.applied_date }}
    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
