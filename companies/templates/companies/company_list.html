{% extends 'base.html' %}

{% block content %}

<h2>Companies</h2>

<a href="{% url 'add_company' %}">
    Add Company
</a>

<br><br>

<form method="GET">

    <input
        type="text"
        name="q"
        placeholder="Search company name">

    <button type="submit">

        Search

    </button>

</form>

<br>

<table>

<tr>
    <th>ID</th>
    <th>Company</th>
    <th>Eligibility CGPA</th>
    <th>Package (LPA)</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for company in companies %}

<tr>

    <td>{{ company.id }}</td>

    <td>{{ company.company_name }}</td>

    <td>{{ company.eligibility_criteria }}</td>

    <td>{{ company.package }}</td>

    <td>

        <a href="{% url 'edit_company' company.id %}">
        Edit
        </a>

    </td>

    <td>

        <a href="{% url 'delete_company' company.id %}">
        Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
