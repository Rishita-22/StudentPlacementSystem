{% extends 'base.html' %}

{% block content %}

<h2>Delete Company</h2>

<p>

    Are you sure you want to delete

    <b>{{ company.company_name }}</b> ?

</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">

        Yes Delete

    </button>

</form>

<br>

<a href="{% url 'company_list' %}">

    Cancel

</a>

{% endblock %}
