{% extends 'base.html' %}

{% block content %}

<h2>Delete Student</h2>

<p>

    Are you sure you want to delete

    <b>{{ student.name }}</b> ?

</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit">

        Yes Delete

    </button>

</form>

<br>

<a href="{% url 'student_list' %}">

    Cancel

</a>

{% endblock %}
